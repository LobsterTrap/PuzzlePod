name: "Safe Code Edit"
description: "Agent adds a utility function and updates main.py -- a normal coding task"
profile: standard
base_path: /tmp/puzzled-demo
task: "Add a string formatting utility and import it from main"
expected_outcome: committed

actions:
  - type: write_file
    path: src/formatting.py
    description: "Create new utility module"
    tags: [safe]
    content: |
      def title_case(text: str) -> str:
          return text.strip().title()

      def slug(text: str) -> str:
          return text.strip().lower().replace(" ", "-")

  - type: write_file
    path: tests/test_formatting.py
    description: "Add unit tests"
    tags: [safe]
    content: |
      from src.formatting import title_case, slug

      def test_title_case():
          assert title_case("hello world") == "Hello World"

      def test_slug():
          assert slug("Hello World") == "hello-world"

  - type: write_file
    path: CHANGELOG.md
    description: "Update changelog"
    tags: [safe]
    content: |
      # Changelog

      ## 0.2.0
      - Added string formatting utilities
