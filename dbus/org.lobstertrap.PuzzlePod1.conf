<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<!--
  D-Bus access control policy for puzzled (org.lobstertrap.PuzzlePod1.Manager).

  Only root and members of the "puzzled" group may own the bus name
  or call methods on the Manager interface. All other users are denied.
-->
<busconfig>
  <!-- Only root can own the bus name (puzzled runs as root) -->
  <policy user="root">
    <allow own="org.lobstertrap.PuzzlePod1"/>
    <allow send_destination="org.lobstertrap.PuzzlePod1"/>
    <allow send_interface="org.lobstertrap.PuzzlePod1.Manager"/>
  </policy>

  <!-- Members of the puzzled group can call methods -->
  <policy group="puzzled">
    <allow send_destination="org.lobstertrap.PuzzlePod1"/>
    <allow send_interface="org.lobstertrap.PuzzlePod1.Manager"/>
  </policy>

  <!-- Deny all other users by default -->
  <policy context="default">
    <deny own="org.lobstertrap.PuzzlePod1"/>
    <deny send_destination="org.lobstertrap.PuzzlePod1"/>
    <deny send_interface="org.lobstertrap.PuzzlePod1.Manager"/>
    <!-- m20: Allow receiving D-Bus signals from puzzled (branch_created, etc.) -->
    <allow receive_sender="org.lobstertrap.PuzzlePod1"/>
  </policy>
</busconfig>
