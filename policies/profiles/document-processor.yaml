name: document-processor
description: >
  Profile for document conversion and processing agents. Network is fully
  blocked to prevent data exfiltration. Supports LibreOffice for office
  document conversion, Pandoc for markup conversion, and pdftotext for
  PDF extraction.

filesystem:
  read_allowlist:
    - /usr/share
    - /usr/lib
    - /usr/lib64
    - /etc/fonts
    - /etc/alternatives
  write_allowlist:
    - /tmp
  denylist:
    - /etc/shadow
    - /etc/gshadow
    - /etc/ssh
    - /root/.ssh
    - /etc/sudoers
    - /etc/sudoers.d
  # N15: Defense-in-depth read/write denylists
  read_denylist:
    - /etc/shadow
    - /etc/gshadow
    - /etc/sudoers
    - /etc/sudoers.d
  write_denylist:
    - /etc
    - /usr
    - /boot
    - /sbin
    - /bin
    - /lib
    - /lib64
    - /var/log
    - /root

exec_allowlist:
  - /usr/bin/python3
  - /usr/bin/libreoffice
  - /usr/bin/pandoc
  - /usr/bin/pdftotext
  - /usr/bin/cat
  - /usr/bin/ls
  - /usr/bin/head
  - /usr/bin/tail
  - /usr/bin/grep
  - /usr/bin/wc
  - /usr/bin/file

# T24: Expanded exec_denylist — privilege escalation + exfiltration vectors
exec_denylist:
  - nsenter
  - unshare
  - chroot
  - mount
  - strace
  - gdb
  - su
  - sudo
  - pkexec
  - dd
  - nc
  - ncat
  - socat
  - capsh
  - setcap
  - modprobe
  - insmod
  - kexec
  - bpftool

resource_limits:
  memory_bytes: 536870912      # 512 MiB
  cpu_shares: 100
  io_weight: 100
  max_pids: 32
  storage_quota_mb: 2048
  inode_quota: 10000

network:
  mode: Blocked
  allowed_domains: []

behavioral:
  max_deletions: 20
  max_reads_per_minute: 500
  credential_access_alert: true

seccomp_mode: Permissive
allow_symlinks: false

fail_mode: FailClosed
