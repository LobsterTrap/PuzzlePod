name: backup-agent
description: >
  Profile for backup and archiving agents. Network is fully blocked to
  prevent data exfiltration. Supports rsync for incremental copies, tar
  for archiving, and gzip/zstd for compression.

filesystem:
  read_allowlist:
    - /usr/share
    - /usr/lib
    - /usr/lib64
    - /etc/alternatives
  write_allowlist:
    - /tmp
  denylist:
    - /etc/shadow
    - /etc/gshadow
    - /etc/ssh
    - /root/.ssh
    - /etc/sudoers
    - /etc/sudoers.d
  # N15: Defense-in-depth read/write denylists
  read_denylist:
    - /etc/shadow
    - /etc/gshadow
    - /etc/sudoers
    - /etc/sudoers.d
  write_denylist:
    - /etc
    - /usr
    - /boot
    - /sbin
    - /bin
    - /lib
    - /lib64
    - /var/log
    - /root

exec_allowlist:
  - /usr/bin/rsync
  - /usr/bin/tar
  - /usr/bin/gzip
  - /usr/bin/zstd
  - /usr/bin/cat
  - /usr/bin/ls
  - /usr/bin/find
  - /usr/bin/du
  - /usr/bin/sha256sum

# T24: Expanded exec_denylist — privilege escalation + exfiltration vectors
exec_denylist:
  - nsenter
  - unshare
  - chroot
  - mount
  - strace
  - gdb
  - su
  - sudo
  - pkexec
  - dd
  - nc
  - ncat
  - socat
  - capsh
  - setcap
  - modprobe
  - insmod
  - kexec
  - bpftool

resource_limits:
  memory_bytes: 268435456      # 256 MiB
  cpu_shares: 80
  io_weight: 150
  max_pids: 16
  storage_quota_mb: 4096
  inode_quota: 50000

network:
  mode: Blocked
  allowed_domains: []

behavioral:
  max_deletions: 10
  max_reads_per_minute: 5000
  credential_access_alert: true

seccomp_mode: Permissive
allow_symlinks: false

fail_mode: FailClosed
