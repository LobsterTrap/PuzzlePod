name: devops-automation
description: >
  Profile for DevOps and infrastructure automation agents. Gated network
  access to container registries and cloud APIs. Supports Ansible, Terraform,
  Kubernetes, and Helm for infrastructure management.

filesystem:
  read_allowlist:
    - /usr/share
    - /usr/lib
    - /usr/lib64
    - /etc/alternatives
    - /etc/ansible
    - /etc/containers
  write_allowlist:
    - /tmp
  denylist:
    - /etc/shadow
    - /etc/gshadow
    - /etc/ssh
    - /root/.ssh
    - /etc/sudoers
    - /etc/sudoers.d
  # N15: Defense-in-depth read/write denylists
  read_denylist:
    - /etc/shadow
    - /etc/gshadow
    - /etc/sudoers
    - /etc/sudoers.d
  write_denylist:
    - /etc
    - /usr
    - /boot
    - /sbin
    - /bin
    - /lib
    - /lib64
    - /var/log
    - /root

exec_allowlist:
  - /usr/bin/ansible-playbook
  - /usr/bin/ansible
  - /usr/bin/terraform
  - /usr/bin/kubectl
  - /usr/bin/helm
  - /usr/bin/cat
  - /usr/bin/ls
  - /usr/bin/grep
  - /usr/bin/jq
  - /usr/bin/yq
  - /usr/bin/curl

# T24: Expanded exec_denylist — privilege escalation + exfiltration vectors
exec_denylist:
  - nsenter
  - unshare
  - chroot
  - mount
  - strace
  - gdb
  - su
  - sudo
  - pkexec
  - dd
  - nc
  - ncat
  - socat
  - capsh
  - setcap
  - modprobe
  - insmod
  - kexec
  - bpftool

resource_limits:
  memory_bytes: 536870912      # 512 MiB
  cpu_shares: 100
  io_weight: 100
  max_pids: 64
  storage_quota_mb: 1024
  inode_quota: 10000

network:
  mode: Gated
  allowed_domains:
    - registry.redhat.io
    - quay.io
    - registry-1.docker.io
    - production.cloudflare.docker.com
    - releases.hashicorp.com
    - registry.terraform.io

behavioral:
  max_deletions: 50
  max_reads_per_minute: 1000
  credential_access_alert: true

seccomp_mode: Permissive
allow_symlinks: false

fail_mode: FailClosed
