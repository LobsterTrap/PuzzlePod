---
- name: Restart puzzled
  ansible.builtin.systemd:
    name: puzzled
    state: restarted
    daemon_reload: true

- name: Reload dbus
  ansible.builtin.command:
    cmd: dbus-send --system --type=method_call --dest=org.freedesktop.DBus /org/freedesktop/DBus org.freedesktop.DBus.ReloadConfig
  changed_when: false
